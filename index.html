<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#000000" />
  <title>Letz Talk</title>

  <link rel="preconnect" href="https://scripts.converteai.net" crossorigin />
  <link rel="preconnect" href="https://cdn.converteai.net" crossorigin />

  <style>
    :root {
      --bg: #000;
      --fg: #fff;
      --muted: #9aa0a6;
      --green: #35d15a;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { background: var(--bg); min-height: 100%; }
    body {
      color: var(--fg);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      -webkit-font-smoothing: antialiased;
      display: flex;
      flex-direction: column;
      align-items: center;
      min-height: 100vh;
      min-height: 100dvh;
      /* vídeo mais pra cima: pouco espaço no topo */
      padding: clamp(16px, 3vh, 32px) clamp(14px, 4vw, 24px) 40px;
    }

    .headline {
      text-align: center;
      font-weight: 800;
      line-height: 1.3;
      font-size: clamp(19px, 4.4vw, 28px);
      max-width: 22ch;
      margin: 0 auto clamp(14px, 3vw, 22px);
    }
    .headline .num { color: var(--green); white-space: nowrap; }

    /* Vídeo menor e centralizado */
    .player {
      width: 100%;
      max-width: 620px;
      margin: 0 auto;
      border-radius: 10px;
      overflow: hidden;
    }
    vturb-smartplayer { display: block; width: 100% !important; margin: 0 auto; }

    /* Botão de tela cheia */
    .fs-btn {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      margin: 14px auto 0;
      padding: 9px 18px;
      background: transparent;
      color: var(--muted);
      border: 1px solid rgba(255,255,255,.22);
      border-radius: 999px;
      font-size: 14px;
      cursor: pointer;
      transition: color .2s, border-color .2s;
    }
    .fs-btn:hover { color: var(--fg); border-color: rgba(255,255,255,.5); }

    /* Selo de compra segura: escondido até o pitch */
    .secure {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      margin-top: clamp(18px, 4vw, 28px);
      font-size: 14px;
      color: var(--green);
      opacity: 0;
      transform: translateY(8px);
      transition: opacity .5s ease, transform .5s ease;
      pointer-events: none;
    }
    .secure.show { opacity: 1; transform: translateY(0); }
  </style>
</head>
<body>
  <h1 class="headline">Esse método clareou o inglês para <span class="num">482 pessoas</span> em 2026</h1>

  <div class="player" id="playerWrap">
    <vturb-smartplayer id="vid-6a31898cbd5f8521bf355502" style="display:block;margin:0 auto;width:100%;"></vturb-smartplayer>
  </div>

  <button class="fs-btn" id="fsBtn" type="button">⛶ Assistir em tela cheia</button>

  <!-- Selo aparece junto com o botão de comprar (no pitch) -->
  <div class="secure" id="secure">🔒 Compra 100% segura</div>

  <!-- Player VTurb -->
  <script type="text/javascript">
    var s = document.createElement("script");
    s.src = "https://scripts.converteai.net/b6b3a284-e9f3-4b13-825a-d57f292bdf11/players/6a31898cbd5f8521bf355502/v4/player.js";
    s.async = true;
    document.head.appendChild(s);
  </script>

  <!-- Tela cheia -->
  <script type="text/javascript">
    document.getElementById("fsBtn").addEventListener("click", function () {
      var el = document.getElementById("playerWrap");
      if (el.requestFullscreen) el.requestFullscreen();
      else if (el.webkitRequestFullscreen) el.webkitRequestFullscreen();
      else if (el.webkitEnterFullscreen) el.webkitEnterFullscreen();
    });
  </script>

  <!-- Mostra o selo "Compra 100% segura" no momento do pitch.
       AJUSTE o valor abaixo (em milissegundos) pro mesmo tempo em que o
       botão de comprar aparece no seu vídeo.
       Ex.: pitch aos 7 min -> 7 * 60 * 1000 = 420000 -->
  <script type="text/javascript">
    (function () {
      var DELAY_MS = 420000; // <-- troque pelo tempo exato do seu pitch
      window.addEventListener("load", function () {
        setTimeout(function () {
          var sel = document.getElementById("secure");
          if (sel) sel.classList.add("show");
        }, DELAY_MS);
      });
    })();
  </script>
</body>
</html>
