<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#000000" />

  <title>Letz Talk — A verdade sobre aprender ingles</title>
  <meta name="description" content="A verdade sobre aprender inglês que os cursos tradicionais não te contam." />

  <!-- Open Graph / compartilhamento -->
  <meta property="og:type" content="website" />
  <meta property="og:locale" content="pt_BR" />

  <!-- Preconnect para acelerar o carregamento do player -->
  <link rel="preconnect" href="https://scripts.converteai.net" crossorigin />
  <link rel="preconnect" href="https://cdn.converteai.net" crossorigin />
  <link rel="dns-prefetch" href="https://scripts.converteai.net" />

  <style>
    :root {
      --bg: #000000;
      --fg: #ffffff;
      --muted: #9aa0a6;
      --accent: #29a329;
      --accent-hover: #1f8a1f;
      --maxw: 860px;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      background: var(--bg);
      color: var(--fg);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      -webkit-font-smoothing: antialiased;
      text-rendering: optimizeLegibility;
      min-height: 100%;
    }

    body {
      display: flex;
      flex-direction: column;
      min-height: 100vh;
      min-height: 100dvh;
      padding: clamp(16px, 4vw, 40px) clamp(14px, 4vw, 24px);
    }

    .wrap {
      width: 100%;
      max-width: var(--maxw);
      margin: 0 auto;
      flex: 1 0 auto;
    }

    .headline {
      text-align: center;
      font-weight: 700;
      line-height: 1.3;
      font-size: clamp(18px, 4.5vw, 28px);
      margin: 0 auto clamp(16px, 4vw, 28px);
      max-width: 24ch;
    }

    /* Player VTurb responsivo */
    .player {
      width: 100%;
      margin: 0 auto;
      border-radius: 10px;
      overflow: hidden;
    }
    vturb-smartplayer {
      display: block;
      width: 100% !important;
      margin: 0 auto;
    }

    /* CTA — começa escondido e aparece após X segundos (típico de VSL) */
    .cta {
      text-align: center;
      margin-top: clamp(24px, 5vw, 40px);
      opacity: 0;
      transform: translateY(10px);
      transition: opacity .5s ease, transform .5s ease;
      pointer-events: none;
    }
    .cta.show {
      opacity: 1;
      transform: translateY(0);
      pointer-events: auto;
    }
    .cta-btn {
      display: inline-block;
      background: var(--accent);
      color: #fff;
      text-decoration: none;
      font-weight: 700;
      font-size: clamp(16px, 4vw, 20px);
      line-height: 1.2;
      padding: clamp(16px, 4vw, 20px) clamp(28px, 8vw, 48px);
      border-radius: 999px;
      box-shadow: 0 8px 24px rgba(41,163,41,.35);
      transition: background .2s ease, transform .15s ease;
      max-width: 100%;
    }
    .cta-btn:hover { background: var(--accent-hover); transform: translateY(-2px); }
    .cta-btn:active { transform: translateY(0); }
    .cta-sub {
      display: block;
      margin-top: 12px;
      font-size: clamp(12px, 3.2vw, 14px);
      color: var(--muted);
    }

    footer {
      flex-shrink: 0;
      text-align: center;
      margin-top: clamp(32px, 6vw, 56px);
      padding-top: 20px;
      font-size: 13px;
      color: var(--muted);
    }

    @media (max-width: 480px) {
      .headline { max-width: 100%; }
    }
  </style>
</head>
<body>
  <main class="wrap">
    <h1 class="headline">A verdade sobre aprender inglês que os cursos tradicionais não te contam.</h1>

    <div class="player">
      <!-- Player VTurb -->
      <vturb-smartplayer id="vid-6a31898cbd5f8521bf355502" style="display:block;margin:0 auto;width:100%;"></vturb-smartplayer>
    </div>

    <!-- CTA: troque o href pelo link do seu checkout/oferta -->
    <div class="cta" id="cta">
    </div>
  </main>

  <footer>
    LETZ TALK © Todos os direitos reservados
  </footer>

  <!-- Script do player VTurb -->
  <script type="text/javascript">
    (function () {
      var s = document.createElement("script");
      s.src = "https://scripts.converteai.net/b6b3a284-e9f3-4b13-825a-d57f292bdf11/players/6a31898cbd5f8521bf355502/v4/player.js";
      s.async = true;
      document.head.appendChild(s);
    })();
  </script>

  <!-- Mostra o botão de CTA após X segundos.
       Ajuste o valor (em milissegundos) para o momento exato da oferta no vídeo.
       Ex.: pitch aos 8min -> 8*60*1000 = 480000 -->
  <script type="text/javascript">
    (function () {
      var DELAY_MS = 0; // 0 = mostra na hora. Troque pelo tempo do pitch, ex.: 480000
      window.addEventListener("load", function () {
        setTimeout(function () {
          var cta = document.getElementById("cta");
          if (cta) cta.classList.add("show");
        }, DELAY_MS);
      });
    })();
  </script>
</body>
</html>
