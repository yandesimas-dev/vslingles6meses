<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#ffffff" />
  <title>Acesso vitalício — Planejamento 2026 | Letz Talk</title>
  <style>
    *{ box-sizing:border-box; margin:0; padding:0; }
    html,body{ background:#ffffff; }
    body{
      color:#0d1b14;
      font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
      -webkit-font-smoothing:antialiased;
      padding:clamp(24px,5vw,44px) clamp(16px,5vw,24px) 50px;
      text-align:center;
    }
    .wrap{ width:100%; max-width:520px; margin:0 auto; }

    .label{
      display:inline-block; color:#1c9e45; font-weight:700;
      font-size:14px; letter-spacing:.5px; margin-bottom:14px;
    }

    /* Vitrine do produto */
    .card{
      background:#fff; border:1px solid #e6e8eb; border-radius:16px;
      padding:clamp(16px,4vw,24px); box-shadow:0 10px 30px rgba(0,0,0,.07);
      margin-bottom:clamp(26px,6vw,36px);
    }
    .card img{
      width:100%; max-width:340px; height:auto; border-radius:12px; display:block; margin:0 auto 16px;
    }
    .pname{ font-size:clamp(20px,5vw,26px); font-weight:800; margin-bottom:6px; }
    .psub{ color:#5b6b63; font-size:clamp(14px,3.6vw,16px); }

    .q{
      font-size:clamp(19px,4.6vw,26px); font-weight:700; line-height:1.4;
      max-width:20ch; margin:0 auto clamp(22px,5vw,30px);
    }
    .price-line{ color:#1c9e45; font-weight:800; }
  </style>
</head>
<body>
  <main class="wrap">
    <span class="label">✓ Você acabou de adquirir:</span>

    <!-- Vitrine: produto adquirido -->
    <div class="card">
      <img src="produto-planner.jpg" alt="Planejamento 2026" />
      <div class="pname">Planejamento 2026</div>
      <div class="psub">Seu plano semanal para destravar o inglês</div>
    </div>

    <h1 class="q">Gostaria de ter acesso vitalício a este produto por mais <span class="price-line">R$9,90</span>?</h1>

    <!-- Botões de 1 clique da Kiwify -->
    <div style="text-align:center" id="kiwify-upsell-xp07ftQ" data-upsell-url="" data-downsell-url="">
      <button id="kiwify-upsell-trigger-xp07ftQ" style="background-color:#1fab48;padding:16px 30px;cursor:pointer;color:#ffffff;font-weight:800;border-radius:999px;border:none;font-size:20px;box-shadow:0 8px 22px rgba(31,171,72,.3);">Sim, eu quero acesso vitalício!</button>
      <div id="kiwify-upsell-cancel-trigger-xp07ftQ" style="margin-top:1.2rem;cursor:pointer;font-size:15px;text-decoration:underline;color:#7a8884;font-family:sans-serif;">Não, eu gostaria de recusar essa oferta</div>
    </div>
    <script src="https://snippets.kiwify.com/upsell/upsell.min.js"></script>
  </main>
</body>
</html>
